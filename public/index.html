<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Notes App 🌟</title>
    <link rel="icon" type="image/jpg" href="./logoStickynote.jpg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Background setup */
        body {
            background: linear-gradient(135deg, #c78d8d 0%, #dea448 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* Is se heading aur content ek ke neechay ek ayenge */
            align-items: center;
            /* Horizontal centering */
            justify-content: center;
            /* Vertical centering */
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* --- Naya Alignment Fix --- */
        #app-root {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            /* Space cover karne ke liye */
        }

        /* Login Card styling (Updated for centering) */
        #auth-container .card {
            border: 6px solid #b55464;
            border-radius: 15px;
            max-width: 500px !important;
            /* Size thora normalize kiya taakay mobile pe fit ho */
            width: 100%;
            background-color: #eeaf877b;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 40px !important;
            margin: 20px auto;
            /* Auto margin for centering */
        }

        /* --- Notes Cards Styling --- */
        .custom-note-card {
            background-color: #eee6cbf9 !important;
            border: 4px solid !important;
            border-image: linear-gradient(135deg, #000000, #ffcc00, #000000) 1 !important;
            border-radius: 15px !important;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: auto !important;
            position: relative;
            overflow: hidden;
        }

        .custom-note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2) !important;
        }

        /* Copy Button Styling */
        .copy-btn {
            background: rgba(255, 255, 255, 0.4);
            border: none;
            border-radius: 0 0 0 10px;
            padding: 5px 10px;
            transition: 0.3s;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* --- Animated Dark Input Bar Style --- */
        #note-input-bar {
            background: linear-gradient(-45deg, #000000, #333333, #ffcc00, #1a1a1a);
            background-size: 400% 400%;
            animation: darkShine 10s ease infinite;
            border: none !important;
            border-radius: 15px !important;
        }

        @keyframes darkShine {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        #note-input {
            border-radius: 8px 0 0 8px !important;
            border: none;
        }

        /* Cards Alignment Fix */
        #notes-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            /* Notes ko bhi center rakhega */
            align-items: flex-start;
            width: 100%;
        }

        /* Animated Heading (Aapka Signature Style) */
        h1#main-heading {
            position: fixed;
            /* Absolute se fixed kiya taakay scroll pe hiley nahi */
            top: 20px;
            left: 20px;
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            background: linear-gradient(to right, #ff2200, #00ff88, #007bff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            z-index: 1000;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        #notes-container h2 {
            color: rgba(232, 232, 23, 0.868);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* Landing Page Button Styling */
        #get-started-btn {
            border-radius: 50px;
            font-weight: 800;
            padding: 15px 40px;
            transition: 0.3s transform ease;
        }

        #get-started-btn:hover {
            transform: scale(1.05);
        }

        /* Back Button Custom Styling */
        #back-btn {
            background-color: #000000;
            /* Pure Black Background */
            color: #ffffff;
            /* White Text */
            border: none;
            /* Border khatam */
            border-radius: 8px;
            /* Bilkul Logout jaisa curve */
            padding: 8px 20px;
            /* Sizing fix */
            font-weight: 600;
            /* Text thora bold */
            transition: 0.3s ease;
            /* Smooth hover effect */
        }

        #back-btn:hover {
            background-color: #333333;
            /* Hover par thora gray-black */
            transform: scale(1.05);
            /* Chota sa zoom effect */
            color: #ffffff;
        }
    </style>

</head>

<body class="p-3">

    <h1 id="main-heading" style="display: none;">Welcome to Sticky Note App ✨</h1>

    <div id="app-root" class="w-100">
    </div>

    <div id="notes-container" class="container mt-5" style="display: none;">
        <div class="d-flex justify-content-between align-items-center mb-4 text-white">
            <h2 style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">My Notes 📝</h2>

            <div class="d-flex gap-2">
                <button id="back-btn" class="btn btn-outline-light shadow-sm">Back</button>
                <button id="logout-btn" class="btn btn-danger shadow">Logout</button>
            </div>
        </div>

        <div id="note-input-bar" class="card p-3 mb-4 shadow-sm">
            <div class="input-group">
                <input type="text" id="note-input" class="form-control mb-0" placeholder="Write a note...">
                <button id="add-btn" class="btn btn-success px-4">Add Note</button>
            </div>
        </div>

        <div class="row" id="notes-list">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./src/index.js"></script>
</body>

</html>
